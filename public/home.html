<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home – The Giving Index</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="hero hero-home">
            <h1 class="hero-title">My Saved Charities</h1>
            <p class="hero-subtitle">Charities you've saved from your recommendations</p>
            <a href="index.html" class="btn-primary find-charities-btn">Find More Charities →</a>
        </header>

        <section id="savedSection">
            <div id="savedCharitiesList" class="charities-list"></div>
            <div id="emptyState" class="empty-state">
                <p>No saved charities yet. Find charities that match your values and add them here.</p>
                <a href="index.html" class="btn-primary">Find Charities</a>
            </div>
        </section>
    </div>
</body>
<script type="module" src="saved.js"></script>
</html>
